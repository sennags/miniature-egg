<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="shellGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5D5B8"/>
      <stop offset="50%" style="stop-color:#E8C49A"/>
      <stop offset="100%" style="stop-color:#D4A574"/>
    </linearGradient>
    <filter id="shell">
      <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="2" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  <ellipse cx="16" cy="17" rx="10" ry="13" fill="url(#shellGrad)"/>
  <ellipse cx="16" cy="17" rx="10" ry="13" fill="none" stroke="#C9956C" stroke-width="0.3"/>
  <ellipse cx="13" cy="12" rx="3" ry="4" fill="#FFF8F0" opacity="0.3"/>
</svg>
